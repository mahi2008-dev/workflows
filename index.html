<!DOCTYPE html>
<html>
<body>
    <h1>Smart Bulb Control</h1>
    <button onclick="sendSignal('ON')">Turn ON</button>
    <button onclick="sendSignal('OFF')">Turn OFF</button>

    <script>
        function sendSignal(value) {
            const user = "YOUR_ADAFRUIT_USER";
            const key = "YOUR_ADAFRUIT_KEY";
            const url = `https://io.adafruit.com/api/v2/${user}/feeds/bulb-control/data`;

            fetch(url, {
                method: "POST",
                headers: {
                    "X-AIO-Key": key,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ value: value })
            })
            .then(response => alert("Signal Sent: " + value))
            .catch(err => console.error(err));
        }
    </script>
</body>
</html>
